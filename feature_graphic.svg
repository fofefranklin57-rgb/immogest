<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="50%" style="stop-color:#0D2657"/>
      <stop offset="100%" style="stop-color:#0E4A8A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#1a82d4;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6e"/>
      <stop offset="100%" style="stop-color:#0d1f44"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f8ef7"/>
      <stop offset="100%" style="stop-color:#2196f3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Mesh circles -->
  <circle cx="800" cy="100" r="300" fill="url(#glow)"/>
  <circle cx="200" cy="400" r="200" fill="url(#glow)" opacity="0.5"/>

  <!-- Grid lines subtle -->
  <g opacity="0.05" stroke="#4f8ef7" stroke-width="1">
    <line x1="0" y1="100" x2="1024" y2="100"/>
    <line x1="0" y1="200" x2="1024" y2="200"/>
    <line x1="0" y1="300" x2="1024" y2="300"/>
    <line x1="0" y1="400" x2="1024" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
  </g>

  <!-- ── BUILDING ICON (left zone) ── -->
  <g transform="translate(72, 80)" filter="url(#shadow)">
    <!-- Building 3D simplified -->
    <!-- Face avant -->
    <polygon points="30,220 30,60 120,30 120,190" fill="#2A5298" opacity="0.95"/>
    <!-- Face côté -->
    <polygon points="120,30 170,50 170,210 120,190" fill="#162D5E" opacity="0.95"/>
    <!-- Toit -->
    <polygon points="30,60 120,30 170,50 80,80" fill="#3B6CC4" opacity="0.95"/>
    <!-- Fenêtres face avant -->
    <rect x="45" y="80" width="20" height="16" rx="2" fill="#7ab3f5" opacity="0.8"/>
    <rect x="75" y="80" width="20" height="16" rx="2" fill="#7ab3f5" opacity="0.8"/>
    <rect x="45" y="110" width="20" height="16" rx="2" fill="#4f8ef7" opacity="0.7"/>
    <rect x="75" y="110" width="20" height="16" rx="2" fill="#7ab3f5" opacity="0.8"/>
    <rect x="45" y="140" width="20" height="16" rx="2" fill="#7ab3f5" opacity="0.8"/>
    <rect x="75" y="140" width="20" height="16" rx="2" fill="#4f8ef7" opacity="0.7"/>
    <rect x="45" y="170" width="20" height="16" rx="2" fill="#4f8ef7" opacity="0.5"/>
    <rect x="75" y="170" width="20" height="16" rx="2" fill="#7ab3f5" opacity="0.8"/>
    <!-- Second building behind -->
    <polygon points="140,200 140,80 210,55 210,175" fill="#1E3D7A" opacity="0.7"/>
    <polygon points="210,55 250,70 250,185 210,175" fill="#0F2040" opacity="0.7"/>
    <polygon points="140,80 210,55 250,70 180,95" fill="#2A5298" opacity="0.7"/>
    <!-- Small windows -->
    <rect x="153" y="100" width="14" height="12" rx="1" fill="#4f8ef7" opacity="0.6"/>
    <rect x="178" y="100" width="14" height="12" rx="1" fill="#7ab3f5" opacity="0.5"/>
    <rect x="153" y="125" width="14" height="12" rx="1" fill="#7ab3f5" opacity="0.5"/>
    <rect x="178" y="125" width="14" height="12" rx="1" fill="#4f8ef7" opacity="0.6"/>
    <rect x="153" y="150" width="14" height="12" rx="1" fill="#4f8ef7" opacity="0.5"/>
    <rect x="178" y="150" width="14" height="12" rx="1" fill="#7ab3f5" opacity="0.5"/>
    <!-- Ground line -->
    <line x1="0" y1="225" x2="300" y2="225" stroke="#4f8ef7" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- ── APP NAME ── -->
  <text x="380" y="175" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="800" fill="#ffffff" filter="url(#shadow)">ImmoGest</text>

  <!-- Accent underline -->
  <rect x="380" y="190" width="320" height="4" rx="2" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="380" y="240" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.75)">Gestion immobilière intelligente</text>

  <!-- ── FEATURE PILLS ── -->
  <!-- Pill 1 -->
  <rect x="380" y="272" width="140" height="32" rx="16" fill="rgba(79,142,247,0.2)" stroke="#4f8ef7" stroke-width="1"/>
  <text x="450" y="293" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#7ab3f5" text-anchor="middle">🏢 Immeubles</text>

  <!-- Pill 2 -->
  <rect x="530" y="272" width="140" height="32" rx="16" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1"/>
  <text x="600" y="293" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#7de8a8" text-anchor="middle">💰 Paiements</text>

  <!-- Pill 3 -->
  <rect x="680" y="272" width="140" height="32" rx="16" fill="rgba(241,196,15,0.2)" stroke="#f1c40f" stroke-width="1"/>
  <text x="750" y="293" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#f9e168" text-anchor="middle">📊 Rapports</text>

  <!-- Pill 4 -->
  <rect x="830" y="272" width="140" height="32" rx="16" fill="rgba(155,89,182,0.2)" stroke="#9b59b6" stroke-width="1"/>
  <text x="900" y="293" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="#c99fe8" text-anchor="middle">✨ IA intégrée</text>

  <!-- ── MINI UI CARDS ── -->
  <!-- Card 1 - Locataires -->
  <g transform="translate(380, 325)">
    <rect width="170" height="85" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="12" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">LOCATAIRES</text>
    <text x="12" y="48" font-family="'Segoe UI',Arial,sans-serif" font-size="28" font-weight="700" fill="#fff">248</text>
    <text x="12" y="68" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="#2ecc71">↑ 12 ce mois</text>
    <!-- bar -->
    <rect x="12" y="75" width="146" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="12" y="75" width="110" height="4" rx="2" fill="#4f8ef7"/>
  </g>

  <!-- Card 2 - Encaissements -->
  <g transform="translate(562, 325)">
    <rect width="190" height="85" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="12" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">ENCAISSÉ CE MOIS</text>
    <text x="12" y="48" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#2ecc71">4 850 000</text>
    <text x="12" y="62" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">FCFA</text>
    <text x="12" y="78" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Taux recouvrement 92%</text>
  </g>

  <!-- Card 3 - Marketplace -->
  <g transform="translate(764, 325)">
    <rect width="200" height="85" rx="10" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <text x="12" y="22" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">MARKETPLACE</text>
    <text x="12" y="46" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="700" fill="#fff">🏘️ Annonces</text>
    <text x="12" y="64" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">Publiez. Trouvez. Contactez.</text>
    <rect x="12" y="72" width="120" height="6" rx="3" fill="url(#accent)"/>
  </g>

  <!-- ── BOTTOM BAR ── -->
  <rect x="0" y="465" width="1024" height="35" fill="rgba(0,0,0,0.3)"/>
  <text x="512" y="488" font-family="'Segoe UI',Arial,sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">immogest-34w.pages.dev · Disponible sur Android &amp; Web · Essai gratuit 30 jours</text>
</svg>
