<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E6AAF">
<meta name="description" content="ImmoGest — Gestion immobilière intelligente pour l'Afrique">
<title>ImmoGest — Gestion Immobilière</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- CSS -->
<link rel="stylesheet" href="app.css">

<!-- DOCX -->
<script src="docx.bundle.js" defer></script>

<!-- JS — Ordre strict : i18n → config → utils → supabase → auth → modules → app -->
<script src="js/i18n.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/immeubles.js"></script>
<script src="js/locataires.js"></script>
<script src="js/paiements.js"></script>
<script src="js/rapports.js"></script>
<script src="js/app.js"></script>

<style>
/* ── Spinner ── */
.spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(14,106,175,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Immeubles grid ── */
.immeubles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}
.imm-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  transition: box-shadow 0.2s, transform 0.2s;
}
.imm-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

/* ── Buttons ── */
.btn-sm {
  padding: 6px 14px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity 0.15s;
}
.btn-sm:hover { opacity: 0.85; }
.btn-primary   { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--bg4); border: 1px solid var(--border2) !important; color: var(--text); }
.btn-danger    { background: var(--red); color: #fff; }

/* ── Table responsive ── */
.table-container { overflow-x: auto; }
.table-locataires { width: 100%; border-collapse: collapse; }

/* ── Mobile ── */
@media (max-width: 768px) {
  .sidebar { width: 0; overflow: hidden; position: fixed; z-index: 200; height: 100dvh; }
  .sidebar.open { width: 228px; }
  .main { width: 100%; }
  .content { padding: 16px; }
  .metrics-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .immeubles-grid { grid-template-columns: 1fr; }
  .topbar { padding: 12px 16px; }
}
</style>
</head>

<body>
<div id="app">
  <!-- Chargement initial -->
  <div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#C8DFF5">
    <div style="text-align:center">
      <div style="font-size:48px;margin-bottom:16px">🏢</div>
      <div class="spinner" style="margin:0 auto 12px"></div>
      <p style="color:#3D5270;font-size:13px">ImmoGest v2 — Chargement...</p>
    </div>
  </div>
</div>

<script>
// Démarrage de l'application
document.addEventListener('DOMContentLoaded', function() {
  // Appliquer la direction RTL si arabe
  if (window.IG && window.IG.i18n && window.IG.i18n.lang === 'ar') {
    document.documentElement.dir = 'rtl';
  }

  // Init app
  if (window.IG && window.IG.app) {
    window.IG.app.init().catch(function(e) {
      console.error('Init error:', e);
      document.getElementById('app').innerHTML =
        '<div style="display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px">' +
        '<div style="text-align:center;max-width:400px">' +
        '<div style="font-size:48px;margin-bottom:16px">⚠️</div>' +
        '<h2 style="color:#B93020;margin-bottom:8px">Erreur de chargement</h2>' +
        '<p style="color:#3D5270;font-size:13px;margin-bottom:16px">' + (e.message || 'Erreur inconnue') + '</p>' +
        '<button onclick="location.reload()" style="padding:10px 20px;border-radius:10px;border:none;background:#0E6AAF;color:#fff;cursor:pointer;font-size:14px;font-weight:600">Réessayer</button>' +
        '</div></div>';
    });
  }
});

// PWA Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('OneSignalSDKWorker.js').catch(function() {});
  });
}
</script>
</body>
</html>
