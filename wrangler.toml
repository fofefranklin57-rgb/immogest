name = "immogest-notif-cron"
main = "workers/notif-cron.js"
compatibility_date = "2024-09-23"

# ── Crons planifiés ──────────────────────────────────────────
[triggers]
crons = [
  "0 7 * * *",    # Tous les jours à 8h (heure Cameroun = UTC+1)
  "0 7 1 * *"     # 1er de chaque mois à 8h → rappel loyer mensuel
]

