# ═══════════════════════════════════════════════════════════════
# ImmoGest — Configuration Cloudflare Workers
# ═══════════════════════════════════════════════════════════════

name = "immogest1"
main = "workers/notif-cron.js"
compatibility_date = "2024-09-23"

# ── Crons planifiés ──────────────────────────────────────────
[triggers]
crons = [
  "0 7 * * *",    # Tous les jours à 8h (heure Cameroun = UTC+1)
  "0 7 1 * *"     # 1er de chaque mois à 8h → rappel loyer mensuel
]

# ── Variables d'environnement ────────────────────────────────
[vars]
ONESIGNAL_APP_ID   = "8a3857ab-64cc-4a62-9916-ce46b4768dac"
SUPABASE_URL       = "https://uggxfmwpttfsfcirmeqx.supabase.co"
CAMPAY_ENV         = "demo"
# ── Secrets (injectés via: wrangler secret put NOM) ──────────
# SUPABASE_SERVICE_KEY  = clé service_role Supabase (utilisée par le cron et toutes les routes /db)
# SESSION_SECRET        = secret long aléatoire pour signer les sessions
# CAMPAY_TOKEN          = permanent access token CamPay
# CAMPAY_WEBHOOK_KEY    = webhook key CamPay
# ONESIGNAL_REST_KEY    = REST key OneSignal
# FAPSHI_APIKEY         = clé API Fapshi
# FAPSHI_APIUSER        = identifiant API Fapshi
# ANTHROPIC_API_KEY     = clé API Claude
# OWNER_TOKEN           = token admin propriétaire
